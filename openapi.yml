openapi: 3.0.0
info:
  title: Catalog and Categories API
  description: API for managing products and categories in the catalog.
  version: 1.0.0
servers:
  - url: http://localhost:8484
    description: Local server

paths:
  /products:
    get:
      summary: Search products with filters and pagination
      description: Returns a list of products filtered by category and maximum price, with pagination.
      parameters:
        - name: category
          in: query
          description: Product category
          required: false
          schema:
            type: string
            example: "Clothing"
        - name: maxPrice
          in: query
          description: Maximum price of the product
          required: false
          schema:
            type: string
            example: "100.00"
        - name: offset
          in: query
          description: Starting index of the products
          required: false
          schema:
            type: integer
            default: 0
            example: 0
        - name: limit
          in: query
          description: Number of products to return
          required: false
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        '200':
          description: Filtered list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{code}:
    get:
      summary: Get product by code
      description: Returns a specific product based on its code.
      parameters:
        - name: code
          in: path
          description: Unique code of the product
          required: true
          schema:
            type: string
            example: "PROD001"
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductByCode'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /categories:
    get:
      summary: Get all categories
      description: Returns a list of all available categories.
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new category
      description: Creates a new category in the catalog.
      requestBody:
        description: Category object to be created
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Category created successfully"
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ProductResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Product:
      type: object
      properties:
        code:
          type: string
          example: "PROD001"
        price:
          type: number
          format: float
          example: 99.99
        category:
          type: string
          example: "Clothing"

    ProductByCode:
      type: object
      properties:
        code:
          type: string
          example: "PROD001"
        price:
          type: number
          format: float
          example: 99.99
        category:
          type: string
          example: "Clothing"
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'

    Variant:
      type: object
      properties:
        name:
          type: string
          example: "Color"
        sku:
          type: string
          example: "SKU12345"
        price:
          type: number
          format: float
          example: 19.99

    Pagination:
      type: object
      properties:
        offset:
          type: integer
          example: 0
        limit:
          type: integer
          example: 10
        totalCount:
          type: integer
          example: 100

    CategoryResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Category:
      type: object
      properties:
        name:
          type: string
          example: "Clothing"
        code:
          type: string
          example: "C123"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "An unexpected error occurred"