services:
  postgres:
    image: postgres:17.5
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: challenge
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d challenge -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  http-server:
    build:
      context: ./docker
      dockerfile: Dockerfile.http
    ports:
      - "127.0.0.1:8484:8484"
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  mcp-server:
    build:
      context: ./docker
      dockerfile: Dockerfile.mcp
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      POSTGRES_HOST: postgres
      MCP_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  chat-agent:
    build:
      context: ./docker
      dockerfile: Dockerfile.agent
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      MCP_SERVER_URL: "http://host.docker.internal:8080/sse"
    # To avoid hardcoding, pass ANTHROPIC_API_KEY if present in environment, or user inputs it inside Streamlit.
    depends_on:
      - mcp-server
